name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Rust fmt
        run: cargo fmt --all -- --check

      - name: Rust clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust tests (nextest)
        run: cargo nextest run --profile ci --workspace

      - name: Rust doctests
        run: cargo test --workspace --doc

      - name: Zsh completion tests
        run: zsh -f tests/zsh/completion.test.zsh

      - name: Publish JUnit report
        if: always() && hashFiles('target/nextest/ci/junit.xml') != ''
        uses: mikepenz/action-junit-report@v6
        with:
          token: ${{ github.token }}
          check_name: JUnit Test Report (nextest)
          report_paths: target/nextest/ci/junit.xml
          detailed_summary: true
          group_suite: true
          include_passed: true

      - name: Upload JUnit XML
        if: always() && hashFiles('target/nextest/ci/junit.xml') != ''
        uses: actions/upload-artifact@v6
        with:
          name: junit-nextest
          path: target/nextest/ci/junit.xml
