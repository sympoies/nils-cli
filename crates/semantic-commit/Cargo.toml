[package]
name = "nils-semantic-commit"
version = "0.3.3"
edition.workspace = true
license.workspace = true

description = "CLI crate for nils-semantic-commit in the nils-cli workspace."
repository = "https://github.com/graysurf/nils-cli"

[lib]
name = "semantic_commit"
path = "src/lib.rs"

[[bin]]
name = "semantic-commit"
path = "src/main.rs"
[dependencies]
anyhow = { workspace = true }
serde_json = { workspace = true }
tempfile = "3"
time = { version = "0.3", features = ["formatting"] }
nils-term = { version = "0.3.0", path = "../nils-term", package = "nils-term" }
nils-common = { version = "0.3.0", path = "../nils-common", package = "nils-common" }

[dev-dependencies]
nils-test-support = { path = "../nils-test-support" }
pretty_assertions = { workspace = true }
