[package]
name = "nils-plan-tooling"
version = "0.6.3"
edition.workspace = true
license.workspace = true

description = "CLI crate for nils-plan-tooling in the nils-cli workspace."
repository = "https://github.com/sympoies/nils-cli"

[lib]
name = "plan_tooling"
path = "src/lib.rs"

[[bin]]
name = "plan-tooling"
path = "src/main.rs"
[dependencies]
anyhow = { workspace = true }
nils-term = { version = "0.6.3", path = "../nils-term", package = "nils-term" }
nils-common = { version = "0.6.3", path = "../nils-common", package = "nils-common" }
clap = { workspace = true }
clap_complete = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
nils-test-support = { version = "0.6.3", path = "../nils-test-support" }
pretty_assertions = { workspace = true }
tempfile = "3"
