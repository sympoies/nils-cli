[package]
name = "nils-screen-record"
version = "0.4.0"
edition.workspace = true
license.workspace = true
build = "build.rs"

description = "CLI crate for nils-screen-record in the nils-cli workspace."
repository = "https://github.com/graysurf/nils-cli"

[lib]
name = "screen_record"
path = "src/lib.rs"

[[bin]]
name = "screen-record"
path = "src/main.rs"
[dependencies]
clap = { workspace = true }
ctrlc = "3.5.1"
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }
nils-common = { version = "0.4.0", path = "../nils-common", package = "nils-common" }

[target.'cfg(target_os = "linux")'.dependencies]
x11rb = { version = "0.13", features = ["randr"] }
zbus = { version = "5", features = ["blocking"] }
libc = "0.2"

[target.'cfg(target_os = "macos")'.dependencies]
objc2-foundation = "0.3.2"
objc2-av-foundation = { version = "0.3.2", features = ["objc2-core-media"] }
objc2-core-media = "0.3.2"
objc2-core-video = "0.3.2"
objc2-core-foundation = "0.3.2"
objc2-core-graphics = "0.3.2"
objc2-image-io = "0.3.2"
objc2-screen-capture-kit = "0.3.2"
objc2 = "0.6.3"
block2 = "0.6.2"
dispatch2 = "0.3.0"

[dev-dependencies]
nils-test-support = { version = "0.4.0", path = "../nils-test-support" }
tempfile = "3"

[lints.rust]
unexpected_cfgs = { level = "allow", check-cfg = ["cfg(coverage)"] }
