# Valid fixture for AGENT_DOCS schema + merge behavior tests.
# Coverage:
# - all contexts: startup, skill-dev, task-tools, project-dev
# - same-file duplicate key (last-write-wins)
# - home-vs-project duplicate intent (documented markers for cross-file precedence tests)

[[document]]
context = "startup"
scope = "home"
path = "AGENTS.md"
required = false
when = "always"
notes = "dup-same-file:first"

# Same key as above: (startup, home, AGENTS.md). This entry should win.
[[document]]
context = "startup"
scope = "home"
path = "AGENTS.md"
required = true
when = "always"
notes = "dup-same-file:second-wins"

[[document]]
context = "startup"
scope = "project"
path = "AGENTS.override.md"
required = true
when = "always"
notes = "startup project override policy"

[[document]]
context = "skill-dev"
scope = "home"
path = "DEVELOPMENT.md"
required = true
when = "always"
notes = "skill-dev home baseline"

[[document]]
context = "task-tools"
scope = "home"
path = "CLI_TOOLS.md"
required = true
when = "always"
notes = "task-tools home baseline"

[[document]]
context = "project-dev"
scope = "project"
path = "BINARY_DEPENDENCIES.md"
required = true
when = "always"
notes = "project-dev binary dependencies"

# Home-vs-project duplicate intent:
# Use the same key in both home and project AGENT_DOCS files.
# Expected precedence: project source wins over home source.
[[document]]
context = "project-dev"
scope = "project"
path = "docs/EXTRA_POLICY.md"
required = false
when = "always"
notes = "dup-home-vs-project:home-candidate"
